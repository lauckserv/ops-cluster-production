wordpress:
  enabled: true
  global: 
    fullnameOverride: wordpress
  controllers:
    wordpress:
      enabled: true
      type: deployment
      strategy: Recreate
      replicas: 1
      containers:
        wordpress:
          image:
            repository: wordpress
            tag: 6.9.1
            pullPolicy: IfNotPresent
          env:
            # WordPress Configuration
            WORDPRESS_DB_HOST: wordpress-mysql
            WORDPRESS_DB_NAME: wordpress
            WORDPRESS_DB_USER: wordpress
            WORDPRESS_DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: wp-mysql-secret
                  key: mysql-secret
            WORDPRESS_TABLE_PREFIX: wp_
            WORDPRESS_DEBUG: "0"
            
            # Additional PHP Configuration
            PHP_MEMORY_LIMIT: 256M
            PHP_UPLOAD_MAX_FILESIZE: 64M
            PHP_POST_MAX_SIZE: 64M
            
          probes:
            liveness:
              enabled: true
              spec:
                httpGet:
                  path: /wp-admin/install.php
                  port: 80
                initialDelaySeconds: 120
                periodSeconds: 30
                timeoutSeconds: 5
                failureThreshold: 3
            readiness:
              enabled: true
              spec:
                httpGet:
                  path: /wp-login.php
                  port: 80
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 3
          
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
              
          securityContext:
            runAsUser: 33  # www-data user
            runAsGroup: 33
            runAsNonRoot: true
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

    mysql:
      enabled: true
      type: deployment
      strategy: Recreate
      replicas: 1
      containers:
        mysql:
          image:
            repository: mariadb
            tag: "12.1.2"
            pullPolicy: IfNotPresent
          env:
            MYSQL_ROOT_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: wp-mysql-secret
                  key: mysql-secret
            MYSQL_DATABASE: wordpress
            MYSQL_USER: wordpress
            MYSQL_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: wp-mysql-secret
                  key: mysql-secret
          
          probes:
            liveness:
              enabled: true
              spec:
                exec:
                  command:
                    - mysqladmin
                    - ping
                    - -h
                    - localhost
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 3
            readiness:
              enabled: true
              spec:
                exec:
                  command:
                    - mysql
                    - -h
                    - localhost
                    - -e
                    - SELECT 1
                initialDelaySeconds: 5
                periodSeconds: 2
                timeoutSeconds: 1
          
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
              
          securityContext:
            runAsUser: 999  # mysql user
            runAsGroup: 999
            runAsNonRoot: true
            readOnlyRootFilesystem: false

  service:
    wordpress:
      controller: wordpress
      ports:
        http:
          port: 80
          targetPort: 80
          protocol: TCP
    mysql:
      controller: mysql
      ports:
        mysql:
          port: 3306
          targetPort: 3306
          protocol: TCP

  ingress:
    wordpress:
      enabled: true
      className: nginx
      annotations:
        kubernetes.io/ingress.class: nginx
      hosts:
        - host: dev.mildlyimpressivemedia.com
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: wordpress
                port: http

  persistence:
    wordpress-data:
      enabled: true
      type: persistentVolumeClaim
      size: 10Gi
      storageClass: nfs-client
      accessMode: ReadWriteOnce
      advancedMounts:
        wordpress:
          wordpress:
            - path: /var/www/html
      retain: true

    mysql-data:
      enabled: true
      type: persistentVolumeClaim
      size: 5Gi
      storageClass: nfs-client
      accessMode: ReadWriteOnce
      advancedMounts:
        mysql:
          mysql:
            - path: /var/lib/mysql
      retain: true

  # ConfigMaps for additional configuration
  configMaps:
    php-config:
      enabled: true
      data:
        php.ini: |
          memory_limit = 256M
          upload_max_filesize = 64M
          post_max_size = 64M
          max_execution_time = 300
          max_input_vars = 3000
        
    wordpress-config:
      enabled: true
      data:
        .htaccess: |
          # BEGIN WordPress
          RewriteEngine On
          RewriteBase /
          RewriteRule ^index\.php$ - [L]
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . /index.php [L]
          # END WordPress
          
          # Security headers
          <IfModule mod_headers.c>
              Header always set X-Content-Type-Options nosniff
              Header always set X-Frame-Options DENY
              Header always set X-XSS-Protection "1; mode=block"
          </IfModule>
